<?xml version="1.0" encoding="UTF-8"?>
<!--
Simple placeholder SmartSafe logo. Replace with a polished vector graphic
matching your brand. The design here is a circular badge with an "S" in
negative space; it ensures the GUI renders something visually pleasing
without requiring external assets.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="48" fill="url(#grad)" />
  <text x="50" y="60" font-family="Arial, Helvetica, sans-serif" font-size="56"
        fill="white" text-anchor="middle" font-weight="bold">S</text>
</svg>